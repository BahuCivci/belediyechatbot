<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gölbaşı Belediyesi – Sanal Asistan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #eef2f7;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a5276;
      color: #fff;
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.28);
    }

    .logo {
      width: 46px; height: 46px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: #1a5276;
      flex-shrink: 0;
    }

    header .info h1 { font-size: 1rem; font-weight: 700; }
    header .info p  { font-size: 0.76rem; opacity: .82; margin-top: 2px; }

    .badge {
      margin-left: auto;
      background: #27ae60;
      color: #fff;
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.91rem;
      word-break: break-word;
    }

    .bubble.user {
      background: #1a5276;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .bubble.bot {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      white-space: pre-wrap;
    }

    .bubble.bot a { color: #1a5276; }

    .bubble.typing {
      background: #fff;
      align-self: flex-start;
      padding: 13px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .dots { display: flex; gap: 5px; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #1a5276; animation: blink .9s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes blink {
      0%,80%,100% { transform: translateY(0); opacity:.6; }
      40% { transform: translateY(-6px); opacity:1; }
    }

    .chips-wrap {
      width: 100%;
      max-width: 780px;
      padding: 0 14px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      background: #fff;
      border: 1.5px solid #1a5276;
      color: #1a5276;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.79rem;
      cursor: pointer;
      transition: background .14s, color .14s;
      white-space: nowrap;
    }
    .chip:hover { background: #1a5276; color: #fff; }

    #input-area {
      width: 100%;
      max-width: 780px;
      padding: 8px 14px 14px;
      display: flex;
      gap: 8px;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid #c0cfdc;
      border-radius: 24px;
      padding: 11px 17px;
      font-size: 0.91rem;
      outline: none;
      resize: none;
      height: 46px;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color .2s;
      font-family: inherit;
    }
    #user-input:focus { border-color: #1a5276; }

    #send-btn {
      background: #1a5276;
      border: none;
      border-radius: 50%;
      width: 46px; height: 46px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover  { background: #154360; }
    #send-btn:disabled { background: #aab; cursor: default; }
    #send-btn svg { fill: #fff; }

    .welcome {
      text-align: center;
      color: #5d7a8a;
      padding: 24px 16px 8px;
    }
    .welcome h2 { font-size: 1.05rem; margin-bottom: 5px; }
    .welcome p  { font-size: 0.83rem; }

    footer {
      width: 100%;
      text-align: center;
      font-size: 0.7rem;
      color: #8ea0ae;
      padding-bottom: 5px;
    }
    footer a { color: #1a5276; }
  </style>
</head>
<body>

<header>
  <div class="logo">G</div>
  <div class="info">
    <h1>Gölbaşı Belediyesi</h1>
    <p>Sanal Asistan</p>
  </div>
  <span class="badge">Çevrimiçi</span>
</header>

<div id="chat-window">
  <div class="welcome">
    <h2>Merhaba! Size nasıl yardımcı olabilirim?</h2>
    <p>Belediye hizmetleri, başvurular ve ilçemiz hakkında sorularınızı yanıtlıyorum.</p>
  </div>
</div>

<div class="chips-wrap" id="chips">
  <button class="chip" onclick="quickSend(this)">Vergi ödeme</button>
  <button class="chip" onclick="quickSend(this)">Nikah randevusu</button>
  <button class="chip" onclick="quickSend(this)">İletişim bilgileri</button>
  <button class="chip" onclick="quickSend(this)">Mogan Gölü</button>
  <button class="chip" onclick="quickSend(this)">Cenaze hizmetleri</button>
  <button class="chip" onclick="quickSend(this)">Çalışma saatleri</button>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Sorunuzu yazın…" rows="1"></textarea>
  <button id="send-btn" onclick="send()" aria-label="Gönder">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<footer>
  Resmi başvurular için: <a href="https://www.ankaragolbasi.bel.tr" target="_blank">ankaragolbasi.bel.tr</a> &nbsp;|&nbsp; 0312 485 55 55
</footer>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input      = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const chips      = document.getElementById('chips');

  const history = [];

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  });

  function quickSend(btn) {
    input.value = btn.textContent;
    chips.style.display = 'none';
    send();
  }

  function addBubble(role, text) {
    const d = document.createElement('div');
    d.className = `bubble ${role}`;
    d.textContent = text;
    chatWindow.appendChild(d);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return d;
  }

  function addTyping() {
    const d = document.createElement('div');
    d.className = 'bubble typing';
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    chatWindow.appendChild(d);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return d;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = '46px';
    sendBtn.disabled = true;
    chips.style.display = 'none';

    addBubble('user', text);
    history.push({ role: 'user', content: text });

    const typing = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Sunucu hatası');
      }

      const data = await res.json();
      typing.remove();
      addBubble('bot', data.reply);
      history.push({ role: 'assistant', content: data.reply });

      if (history.length > 40) history.splice(0, 2);

    } catch (err) {
      typing.remove();
      addBubble('bot', `Bir hata oluştu: ${err.message}\nLütfen tekrar deneyin.`);
      history.pop();
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
